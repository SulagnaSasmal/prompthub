services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: prompthub
      POSTGRES_USER: prompthub
      POSTGRES_PASSWORD: prompthub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prompthub"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://prompthub:prompthub@db:5432/prompthub
      SECRET_KEY: change-me-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  docs:
    image: squidfunk/mkdocs-material:latest
    ports:
      - "8080:8000"
    volumes:
      - ./docs:/docs
    command: serve --dev-addr=0.0.0.0:8000

volumes:
  pgdata:
